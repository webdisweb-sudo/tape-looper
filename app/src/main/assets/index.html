<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TAPE LOOPER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#b0b8c0;
  --panel:#c8d0d8;
  --panel2:#d8e0e8;
  --panel3:#e0e8f0;
  --border:#8090a0;
  --border2:#90a0b0;
  --shadow:rgba(60,70,80,0.35);
  --shadow2:rgba(255,255,255,0.7);
  --amber:#c87800;
  --amber2:#a06000;
  --amberbg:#fff8ee;
  --red:#cc2200;
  --redbg:#fff0ee;
  --green:#227700;
  --greenbg:#eeffee;
  --blue:#0055cc;
  --purple:#7700cc;
  --txt:#1a2028;
  --txt2:#384050;
  --txt3:#607080;
  --screw:#8090a0;
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--txt);font-family:'Courier New',monospace;overflow:hidden}
#app{height:100vh;width:100vw;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(160deg,#c8d4dc 0%,#a8b8c4 100%)}

/* BRUSHED METAL TEXTURE */
#app::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(255,255,255,0.03) 2px,rgba(255,255,255,0.03) 4px);pointer-events:none;z-index:0}

/* HEADER */
#hdr{background:linear-gradient(180deg,#d0d8e0 0%,#a8b4c0 100%);border-bottom:2px solid var(--border);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;box-shadow:0 2px 4px var(--shadow);position:relative;z-index:1}
.logo{font-size:12px;letter-spacing:4px;color:var(--txt2);font-weight:bold;white-space:nowrap;text-shadow:0 1px 0 var(--shadow2)}
.hbtns{display:flex;gap:5px;flex-wrap:wrap}
.hbtn{padding:5px 9px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;border-radius:3px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;white-space:nowrap;box-shadow:0 1px 2px var(--shadow),inset 0 1px 0 var(--shadow2)}
.hbtn:active{background:linear-gradient(180deg,var(--panel),var(--panel3));box-shadow:inset 0 1px 3px var(--shadow)}
.dots{display:flex;gap:5px;align-items:center;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;background:#8090a0;border:1px solid var(--border);box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);transition:all .2s}
.dot.rec{background:#ff3311;box-shadow:0 0 6px #ff3311,inset 0 1px 2px rgba(0,0,0,0.3)}
.dot.play{background:#ffaa00;box-shadow:0 0 6px #ffaa00,inset 0 1px 2px rgba(0,0,0,0.3)}

/* MASTER */
#mbar{background:linear-gradient(180deg,#c0ccd4,#b0bcc8);border-bottom:1px solid var(--border);padding:5px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap;box-shadow:0 1px 3px var(--shadow);position:relative;z-index:1}
.mlbl{font-size:8px;color:var(--txt3);letter-spacing:2px;white-space:nowrap;font-weight:bold}
.mvu{display:flex;gap:2px;align-items:flex-end}
.mvb{width:5px;border-radius:1px;background:#8090a0;border:1px solid #6070808;transition:background .05s;box-shadow:inset 0 1px 1px rgba(0,0,0,0.3)}
.mbtns{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.mbtn{padding:5px 9px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;border-radius:3px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;white-space:nowrap;box-shadow:0 1px 2px var(--shadow),inset 0 1px 0 var(--shadow2)}
.mbtn:active{box-shadow:inset 0 1px 3px var(--shadow)}
.mbtn.ap{background:linear-gradient(180deg,#fff8e0,#ffe8a0);border-color:var(--amber);color:var(--amber2);box-shadow:0 0 4px #ffaa0044,0 1px 2px var(--shadow)}
.mbtn.ar{background:linear-gradient(180deg,#fff0ee,#ffcccc);border-color:var(--red);color:var(--red)}
.mbtn.al{background:linear-gradient(180deg,#eeffee,#ccffcc);border-color:var(--green);color:var(--green)}
.mbtn.ab{background:linear-gradient(180deg,#f0eeff,#ccccff);border-color:var(--purple);color:var(--purple)}

/* TAPE PARAMS */
#tpar{background:linear-gradient(180deg,#bcc8d0,#aab8c4);border-bottom:1px solid var(--border);padding:5px 10px;display:flex;gap:10px;align-items:center;flex-shrink:0;overflow-x:auto;position:relative;z-index:1}
.pg{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.pl{font-size:7px;color:var(--txt3);letter-spacing:1px;white-space:nowrap;font-weight:bold}
.pv{font-size:7px;color:var(--amber2)}
input[type=range].ps{-webkit-appearance:none;appearance:none;height:3px;width:55px;background:linear-gradient(180deg,#8090a0,#a0b0c0);border-radius:2px;outline:none;box-shadow:inset 0 1px 2px rgba(0,0,0,0.4)}
input[type=range].ps::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#e8f0f8,#8090a0);border:1px solid var(--border);cursor:pointer;box-shadow:0 1px 3px var(--shadow)}

/* MAIN LAYOUT - changes in landscape */
#main-layout{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative;z-index:1}

/* PORTRAIT: tracks scroll */
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:6px;display:flex;flex-direction:column;gap:5px}
#scroll::-webkit-scrollbar{width:4px}
#scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#scroll::-webkit-scrollbar-track{background:var(--bg)}

/* LANDSCAPE: side by side */
@media (orientation:landscape){
  #main-layout{flex-direction:row}
  #scroll{width:55%;min-width:55%;flex-shrink:0;border-right:2px solid var(--border)}
  #eq-panel{display:flex!important;flex:1;overflow-y:auto;padding:8px;flex-direction:column;gap:6px;background:linear-gradient(180deg,#c0ccd4,#b0bcc8)}
  #hdr .logo{font-size:10px;letter-spacing:2px}
}

/* EQ PANEL (visible in landscape, hidden in portrait via card expand) */
#eq-panel{display:none;flex-direction:column;gap:6px}
.eq-panel-title{font-size:9px;color:var(--txt3);letter-spacing:3px;font-weight:bold;padding:4px 0}
.eq-track-section{background:var(--panel2);border-radius:6px;border:1px solid var(--border);padding:8px;box-shadow:0 1px 3px var(--shadow),inset 0 1px 0 var(--shadow2)}
.eq-track-title{font-size:9px;font-weight:bold;margin-bottom:6px}

/* TRACK CARD */
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:6px;border:1px solid var(--border);overflow:hidden;transition:border-color .2s;box-shadow:0 2px 4px var(--shadow),inset 0 1px 0 var(--shadow2)}
.card.hb{border-color:#6090a0;box-shadow:0 2px 4px var(--shadow),inset 0 1px 0 var(--shadow2),0 0 0 1px #a0c0d0}
.card.ip{border-color:var(--amber);box-shadow:0 2px 4px var(--shadow),0 0 4px #ffaa0033}
.card.ir{border-color:var(--red);box-shadow:0 2px 4px var(--shadow),0 0 4px #ff220033}

.thdr{display:flex;align-items:center;gap:6px;padding:6px 9px;background:linear-gradient(180deg,#d0dae2,#b8c4ce);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;min-height:36px}
.tnum{font-size:11px;font-weight:bold;min-width:26px;flex-shrink:0;text-shadow:0 1px 0 var(--shadow2)}
.tname{font-size:9px;color:var(--txt2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tvrow{display:flex;gap:2px;flex-shrink:0}
.vs{height:10px;width:11px;border-radius:1px;background:#8090a0;border:1px solid #6070808;transition:background .04s;box-shadow:inset 0 1px 1px rgba(0,0,0,0.3)}
.tstat{width:8px;height:8px;border-radius:50%;background:#7080908;border:1px solid var(--border);flex-shrink:0;box-shadow:inset 0 1px 2px rgba(0,0,0,0.4)}
.tstat.rec{background:#ff3311;box-shadow:0 0 5px #ff3311}
.tstat.play{background:#ffaa00;box-shadow:0 0 5px #ffaa00}
.earr{font-size:9px;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.earr.open{transform:rotate(180deg)}

.tbody{padding:7px 9px;display:flex;flex-direction:column;gap:5px}
.tbody.collapsed{display:none}

/* SLIDERS */
.frow{display:flex;align-items:center;gap:6px}
.flbl{font-size:8px;color:var(--txt3);min-width:34px;letter-spacing:1px;flex-shrink:0;font-weight:bold}
input[type=range].fdr{-webkit-appearance:none;appearance:none;flex:1;height:6px;background:linear-gradient(180deg,#8090a0,#a0b0c0);border-radius:3px;outline:none;box-shadow:inset 0 2px 3px rgba(0,0,0,0.4)}
input[type=range].fdr::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:4px;background:radial-gradient(circle at 35% 25%,#e8f0f8,#8898a8);border:1px solid var(--border);cursor:pointer;box-shadow:0 2px 5px var(--shadow),inset 0 1px 0 var(--shadow2)}
.fval{font-size:9px;color:var(--txt2);min-width:36px;text-align:right;flex-shrink:0;font-weight:bold}
input[type=range].ss{-webkit-appearance:none;appearance:none;flex:1;height:4px;background:linear-gradient(180deg,#8090a0,#a0b0c0);border-radius:2px;outline:none;box-shadow:inset 0 1px 2px rgba(0,0,0,0.4)}
input[type=range].ss::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 25%,#e8f0f8,#8898a8);border:1px solid var(--border);cursor:pointer;box-shadow:0 1px 3px var(--shadow)}

.sec{font-size:7px;color:var(--txt3);letter-spacing:3px;padding:3px 0 4px;border-bottom:1px solid var(--border2);margin-bottom:2px;font-weight:bold}

/* BUTTONS */
.brow{display:flex;gap:4px;flex-wrap:wrap}
.tb{padding:7px 10px;font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;border-radius:3px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;white-space:nowrap;box-shadow:0 1px 2px var(--shadow),inset 0 1px 0 var(--shadow2)}
.tb:active{background:linear-gradient(180deg,var(--panel),var(--panel3));box-shadow:inset 0 1px 3px var(--shadow)}
.tb.armed{background:linear-gradient(180deg,#fff0ee,#ffcccc);border-color:var(--red);color:var(--red);box-shadow:0 0 4px #ff220033,0 1px 2px var(--shadow)}
.tb.playing{background:linear-gradient(180deg,#fff8e0,#ffe8a0);border-color:var(--amber);color:var(--amber2)}
.tb.looping{background:linear-gradient(180deg,#eeffee,#ccffcc);border-color:var(--green);color:var(--green)}
.tb.muted{background:linear-gradient(180deg,#fff0ee,#ffcccc);border-color:var(--red);color:var(--red)}
.tb.soloed{background:linear-gradient(180deg,#fffff0,#ffeeaa);border-color:#aa8800;color:#886600}
.tb.dis{opacity:.4;pointer-events:none}

/* EQ IN CARD */
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.eq-band{background:linear-gradient(180deg,var(--panel3),var(--panel2));border-radius:4px;padding:5px 7px;border:1px solid var(--border);box-shadow:inset 0 1px 0 var(--shadow2)}
.eq-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.eq-lbl{font-size:7px;color:var(--txt3);font-weight:bold}
.eq-val{font-size:8px;color:var(--blue);font-weight:bold}

/* FOOTER */
#foot{border-top:2px solid var(--border);padding:4px 10px;display:flex;gap:8px;font-size:8px;color:var(--txt3);flex-shrink:0;background:linear-gradient(180deg,#b0bcc8,#a0b0bc);flex-wrap:wrap;align-items:center;box-shadow:0 -1px 3px var(--shadow);position:relative;z-index:1}

/* SCREWS decoration */
.screw{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#d0d8e0,#7080908);border:1px solid var(--border);box-shadow:0 1px 2px var(--shadow);flex-shrink:0}

/* BOUNCE */
#bounce-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(80,100,120,0.7);z-index:100;align-items:center;justify-content:center;flex-direction:column}
#bounce-overlay.show{display:flex}
.bounce-box{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--border);border-radius:10px;padding:20px 24px;text-align:center;max-width:300px;width:90%;box-shadow:0 8px 24px var(--shadow),inset 0 1px 0 var(--shadow2)}
.bounce-title{font-size:12px;color:var(--txt2);letter-spacing:3px;margin-bottom:12px;font-weight:bold}
.bounce-progress{width:100%;height:6px;background:linear-gradient(180deg,#8090a0,#a0b0c0);border-radius:3px;overflow:hidden;margin:8px 0;box-shadow:inset 0 2px 3px rgba(0,0,0,0.4)}
.bounce-bar{height:100%;background:linear-gradient(90deg,var(--amber2),var(--amber));width:0%;transition:width .1s}
.bounce-btns{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.bbtn{padding:8px 14px;font-family:'Courier New',monospace;font-size:10px;border-radius:4px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;box-shadow:0 1px 2px var(--shadow),inset 0 1px 0 var(--shadow2)}
.bbtn:active{box-shadow:inset 0 1px 3px var(--shadow)}
.bbtn.primary{background:linear-gradient(180deg,#fff8e0,#ffe0a0);border-color:var(--amber);color:var(--amber2)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="screw"></div>
    <span class="logo">TAPE LOOPER 8-TRACK</span>
    <div class="hbtns">
      <button class="hbtn" id="btn-save">💾 SAVE</button>
      <button class="hbtn" id="btn-load-proj">📂 OPEN</button>
      <button class="hbtn" id="btn-bounce" style="border-color:var(--purple);color:var(--purple)">⬇ BOUNCE</button>
    </div>
    <div class="dots"><div class="dot" id="dr"></div><div class="dot" id="dp"></div></div>
    <div class="screw"></div>
  </div>

  <div id="mbar">
    <span class="mlbl">MASTER</span>
    <div class="mvu" id="vul"></div>
    <div class="mvu" id="vur"></div>
    <div class="mbtns">
      <button class="mbtn" id="ba-play">▶ ALL</button>
      <button class="mbtn" id="ba-stop">■ STOP</button>
      <button class="mbtn" id="ba-rec">● REC</button>
      <button class="mbtn" id="ba-loop">∞ LOOP</button>
    </div>
  </div>

  <div id="tpar">
    <span class="mlbl">GLOBAL TAPE</span>
    <div class="pg"><span class="pl">NOISE</span><input type="range" class="ps" id="sl-n" min="0" max="100" value="25"><span class="pv" id="vn">25%</span></div>
    <div class="pg"><span class="pl">WOW</span><input type="range" class="ps" id="sl-w" min="0" max="100" value="30"><span class="pv" id="vw">30%</span></div>
    <div class="pg"><span class="pl">DEGRADE</span><input type="range" class="ps" id="sl-d" min="0" max="100" value="0"><span class="pv" id="vd">0%</span></div>
    <div class="pg"><span class="pl">BW</span><input type="range" class="ps" id="sl-b" min="0" max="100" value="70"><span class="pv" id="vb">70%</span></div>
  </div>

  <div id="main-layout">
    <div id="scroll"></div>
    <div id="eq-panel">
      <div class="eq-panel-title">EQ — выбери трек</div>
      <div id="eq-panel-content"></div>
    </div>
  </div>

  <div id="foot">
    <div class="screw"></div>
    <span id="foot-tracks"></span>
    <span style="margin-left:auto">TAPE LOOPER v1.2</span>
    <div class="screw"></div>
  </div>
</div>

<!-- BOUNCE -->
<div id="bounce-overlay">
  <div class="bounce-box">
    <div class="bounce-title">BOUNCE TO FILE</div>
    <div style="font-size:10px;color:var(--txt2);margin-bottom:10px">Выберите формат экспорта</div>
    <div class="bounce-btns">
      <button class="bbtn primary" onclick="bounceStart('stereo')">🎵 Стерео микс WAV</button>
      <button class="bbtn" onclick="bounceStart('tracks')">🎛 Все треки отдельно</button>
    </div>
    <div class="bounce-progress" id="bp-bar" style="display:none"><div class="bounce-bar" id="bp-fill"></div></div>
    <div id="bp-status" style="font-size:9px;color:var(--txt3);margin-top:6px;min-height:16px"></div>
    <div class="bounce-btns" style="margin-top:8px">
      <button class="bbtn" onclick="closeBounce()">ЗАКРЫТЬ</button>
    </div>
  </div>
</div>

<script>
'use strict';
const TC=['#c87800','#227700','#0055cc','#881188','#886600','#7700cc','#007766','#cc2200'];
const N=8;
let actx=null,masterGain=null,analL=null,analR=null,globalLoop=false;
let selectedEQTrack=0;

const T=Array.from({length:N},(_,i)=>({
  i,buf:null,src:null,chain:null,mr:null,chunks:[],
  playing:false,recording:false,
  vol:0.8,inputGain:0.7,mute:false,solo:false,loop:false,speed:1.0,
  noise:0.2,wow:0.3,degrade:0,bw:0.7,
  eq:{lo:0,lmid:0,hmid:0,hi:0},
  color:TC[i],expanded:false,name:null
}));

function ctx(){
  if(!actx){
    actx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=actx.createGain(); masterGain.gain.value=0.85;
    const sp=actx.createChannelSplitter(2);
    analL=actx.createAnalyser(); analL.fftSize=256;
    analR=actx.createAnalyser(); analR.fftSize=256;
    masterGain.connect(sp);
    sp.connect(analL,0); sp.connect(analR,1);
    analL.connect(actx.destination); analR.connect(actx.destination);
  }
  if(actx.state==='suspended') actx.resume();
  return actx;
}

function buildChain(t){
  if(t.chain) return t.chain;
  const c=ctx();
  const inpG=c.createGain(); inpG.gain.value=t.inputGain*2;
  const sat=c.createWaveShaper();
  function makeSatCurve(amt){
    const cv=new Float32Array(512);
    for(let i=0;i<512;i++){const x=(i*2)/512-1;cv[i]=(Math.PI+amt)*x/(Math.PI+amt*Math.abs(x));}
    return cv;
  }
  sat.curve=makeSatCurve(60); sat.oversample='4x';

  // Noise
  const nb=c.createBuffer(1,c.sampleRate*3,c.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=c.createBufferSource(); ns.buffer=nb; ns.loop=true;
  const nf=c.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=2500; nf.Q.value=0.4;
  const ng=c.createGain(); ng.gain.value=t.noise*0.025;
  ns.connect(nf); nf.connect(ng); ns.start();

  // Crackle for degrade
  const cb=c.createBuffer(1,c.sampleRate*2,c.sampleRate);
  const cd=cb.getChannelData(0);
  for(let i=0;i<cd.length;i++) cd[i]=(Math.random()<0.003)?(Math.random()*2-1)*3:0;
  const cs=c.createBufferSource(); cs.buffer=cb; cs.loop=true;
  const cf=c.createBiquadFilter(); cf.type='bandpass'; cf.frequency.value=800; cf.Q.value=1;
  const cg=c.createGain(); cg.gain.value=0;
  cs.connect(cf); cf.connect(cg); cs.start();

  // HP/LP
  const hp=c.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=80;
  const lp=c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1000+t.bw*12000;

  // Wow/flutter - quadratic mapping for fine control
  const dl=c.createDelay(0.3); dl.delayTime.value=0.005;
  const w1=c.createOscillator(); w1.frequency.value=0.7+Math.random()*0.6;
  const wd1=c.createGain(); wd1.gain.value=0;
  w1.connect(wd1); wd1.connect(dl.delayTime); w1.start();
  const w2=c.createOscillator(); w2.frequency.value=6+Math.random()*2;
  const wd2=c.createGain(); wd2.gain.value=0;
  w2.connect(wd2); wd2.connect(dl.delayTime); w2.start();
  const w3=c.createOscillator(); w3.frequency.value=0.1+Math.random()*0.15;
  const wd3=c.createGain(); wd3.gain.value=0;
  w3.connect(wd3); wd3.connect(dl.delayTime); w3.start();

  // 4-band EQ
  const eqLo=c.createBiquadFilter(); eqLo.type='lowshelf'; eqLo.frequency.value=120; eqLo.gain.value=t.eq.lo;
  const eqLM=c.createBiquadFilter(); eqLM.type='peaking'; eqLM.frequency.value=500; eqLM.Q.value=1.2; eqLM.gain.value=t.eq.lmid;
  const eqHM=c.createBiquadFilter(); eqHM.type='peaking'; eqHM.frequency.value=3000; eqHM.Q.value=1.2; eqHM.gain.value=t.eq.hmid;
  const eqHi=c.createBiquadFilter(); eqHi.type='highshelf'; eqHi.frequency.value=10000; eqHi.gain.value=t.eq.hi;

  const fdr=c.createGain(); fdr.gain.value=t.vol;
  const mg=c.createGain(); mg.gain.value=1;
  const an=c.createAnalyser(); an.fftSize=256;

  inpG.connect(sat); sat.connect(hp); hp.connect(lp); lp.connect(dl); dl.connect(eqLo);
  eqLo.connect(eqLM); eqLM.connect(eqHM); eqHM.connect(eqHi);
  eqHi.connect(fdr); fdr.connect(mg);
  ng.connect(mg); cg.connect(mg);
  mg.connect(an); an.connect(masterGain);

  t.chain={inp:inpG,sat,fdr,mg,an,ng,cg,lp,wd1,wd2,wd3,makeSatCurve,
    setVol:v=>{fdr.gain.value=v},
    setMute:m=>{mg.gain.value=m?0:1},
    setInputGain:v=>{inpG.gain.value=v*2;sat.curve=makeSatCurve(30+v*200)},
    setNoise:v=>{ng.gain.value=v*0.03},
    setWow:v=>{const b=v*v;wd1.gain.value=b*0.06;wd2.gain.value=b*0.012;wd3.gain.value=b*0.04},
    setDegrade:v=>{cg.gain.value=v*0.8;if(v>0.5) lp.frequency.value=200+((1-v)*3000)},
    setBW:v=>{lp.frequency.value=1000+v*12000},
    setEQ:(band,v)=>{
      if(band==='lo') eqLo.gain.value=v;
      else if(band==='lmid') eqLM.gain.value=v;
      else if(band==='hmid') eqHM.gain.value=v;
      else if(band==='hi') eqHi.gain.value=v;
    }
  };
  return t.chain;
}

function soloOn(){return T.some(t=>t.solo)}
function updateMutes(){const s=soloOn();T.forEach(t=>{if(t.chain) t.chain.setMute(t.mute||(s&&!t.solo));});}

function applyGlobalTape(){
  const n=+document.getElementById('sl-n').value/100;
  const w=+document.getElementById('sl-w').value/100;
  const d=+document.getElementById('sl-d').value/100;
  const b=+document.getElementById('sl-b').value/100;
  T.forEach(t=>{
    t.noise=n;t.wow=w;t.degrade=d;t.bw=b;
    if(t.chain){t.chain.setNoise(n);t.chain.setWow(w);t.chain.setDegrade(d);t.chain.setBW(b);}
  });
}

function playT(t){
  if(!t.buf) return;
  stopT(t);
  const ch=buildChain(t);
  ch.setVol(t.vol); ch.setInputGain(t.inputGain);
  ch.setNoise(t.noise); ch.setWow(t.wow); ch.setDegrade(t.degrade); ch.setBW(t.bw);
  ['lo','lmid','hmid','hi'].forEach(b=>ch.setEQ(b,t.eq[b]));
  updateMutes();
  const s=ctx().createBufferSource();
  s.buffer=t.buf; s.playbackRate.value=t.speed; s.loop=t.loop||globalLoop;
  s.connect(ch.inp); s._dead=false;
  s.onended=()=>{if(!s._dead){t.playing=false;render(t);dots();}};
  s.start(); t.src=s; t.playing=true; render(t); dots();
}

function stopT(t){
  if(t.src){t.src._dead=true;try{t.src.stop();}catch(e){}t.src=null;}
  t.playing=false; render(t); dots();
}

async function recStart(t){
  ctx();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
    const mr=new MediaRecorder(stream);
    t.chunks=[];
    mr.ondataavailable=e=>t.chunks.push(e.data);
    mr.onstop=async()=>{
      stream.getTracks().forEach(s=>s.stop());
      try{const blob=new Blob(t.chunks,{type:'audio/webm'});const ab=await blob.arrayBuffer();t.buf=await actx.decodeAudioData(ab);t.name='mic-'+(t.i+1);}catch(e){t.name='err';}
      t.recording=false; render(t); dots();
    };
    mr.start(); t.mr=mr; t.recording=true; render(t); dots();
  }catch(e){alert('Микрофон: '+e.message);}
}
function recStop(t){if(t.mr){t.mr.stop();t.mr=null;}}

/* BOUNCE */
function showBounce(){document.getElementById('bounce-overlay').className='bounce-overlay show';document.getElementById('bp-bar').style.display='none';document.getElementById('bp-status').textContent='';}
function closeBounce(){document.getElementById('bounce-overlay').className='bounce-overlay';}

async function bounceStart(mode){
  const tracks=T.filter(t=>t.buf);
  if(!tracks.length){alert('Нет треков');return;}
  document.getElementById('bp-bar').style.display='block';
  document.getElementById('bp-fill').style.width='0%';
  document.getElementById('bp-status').textContent='Рендеринг...';
  const sampleRate=44100;
  let maxDur=0; tracks.forEach(t=>{maxDur=Math.max(maxDur,t.buf.duration/t.speed);}); maxDur=Math.min(maxDur,300);
  if(mode==='stereo'){
    const oc=new OfflineAudioContext(2,Math.ceil(maxDur*sampleRate),sampleRate);
    const og=oc.createGain(); og.gain.value=0.85; og.connect(oc.destination);
    const sa=soloOn();
    tracks.forEach(t=>{
      if(t.mute||(sa&&!t.solo)) return;
      const src=oc.createBufferSource(); src.buffer=t.buf; src.playbackRate.value=t.speed;
      const lp=oc.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1000+t.bw*12000;
      const g=oc.createGain(); g.gain.value=t.vol;
      src.connect(lp); lp.connect(g); g.connect(og); src.start(0);
    });
    document.getElementById('bp-fill').style.width='40%';
    const buf=await oc.startRendering();
    document.getElementById('bp-fill').style.width='80%';
    document.getElementById('bp-status').textContent='Кодирование...';
    downloadBlob(bufferToWav(buf),'tape-mix.wav');
    document.getElementById('bp-fill').style.width='100%';
    document.getElementById('bp-status').textContent='✓ Готово!';
  } else {
    for(let i=0;i<tracks.length;i++){
      const t=tracks[i];
      document.getElementById('bp-fill').style.width=Math.round(i/tracks.length*100)+'%';
      document.getElementById('bp-status').textContent=`Трек ${t.i+1}...`;
      const dur=Math.min(t.buf.duration/t.speed,300);
      const oc=new OfflineAudioContext(2,Math.ceil(dur*sampleRate),sampleRate);
      const src=oc.createBufferSource(); src.buffer=t.buf; src.playbackRate.value=t.speed;
      const lp=oc.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1000+t.bw*12000;
      const g=oc.createGain(); g.gain.value=t.vol;
      src.connect(lp); lp.connect(g); g.connect(oc.destination); src.start(0);
      const buf=await oc.startRendering();
      downloadBlob(bufferToWav(buf),`track-${t.i+1}-${t.name||'tr'}.wav`);
      await new Promise(r=>setTimeout(r,300));
    }
    document.getElementById('bp-fill').style.width='100%';
    document.getElementById('bp-status').textContent='✓ Все треки экспортированы!';
  }
}

function bufferToWav(buffer){
  const nc=buffer.numberOfChannels,len=buffer.length,sr=buffer.sampleRate;
  const ab=new ArrayBuffer(44+len*nc*2); const v=new DataView(ab);
  function ws(o,s){for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF');v.setUint32(4,36+len*nc*2,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,nc,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*nc*2,true);v.setUint16(32,nc*2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,len*nc*2,true);
  let o=44;
  for(let i=0;i<len;i++) for(let ch=0;ch<nc;ch++){const s=Math.max(-1,Math.min(1,buffer.getChannelData(ch)[i]));v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true);o+=2;}
  return new Blob([ab],{type:'audio/wav'});
}

function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

      });
      applyGlobalTape();
      alert('Проект загружен!');

}

const VB=12;
function mkVU(id){const el=document.getElementById(id);if(!el)return;el.innerHTML='';for(let i=0;i<VB;i++){const d=document.createElement('div');d.className='mvb';d.style.height=(3+i*1.6)+'px';el.appendChild(d);}}
function drawVU(anal,id){
  if(!anal)return;
  const d=new Uint8Array(anal.frequencyBinCount); anal.getByteTimeDomainData(d);
  let p=0;for(let i=0;i<d.length;i++) p=Math.max(p,Math.abs(d[i]-128)/128);
  const el=document.getElementById(id);if(!el)return;
  const ch=el.children;
  for(let i=0;i<VB;i++){const lit=p>i/VB;const c=i>=VB-2?'#ff3311':i>=VB-4?'#ffaa00':'#ffcc44';ch[i].style.background=lit?c:'#8090a0';ch[i].style.boxShadow=lit?`0 0 3px ${c}`:'';}
}
function drawTVU(t){
  if(!t.chain)return;
  const d=new Uint8Array(t.chain.an.frequencyBinCount); t.chain.an.getByteTimeDomainData(d);
  let p=0;for(let i=0;i<d.length;i++) p=Math.max(p,Math.abs(d[i]-128)/128);
  const row=document.getElementById('tv'+t.i);if(!row)return;
  const segs=row.children;const n=segs.length;
  for(let i=0;i<n;i++){const lit=p>i/n;const c=i>=n-2?'#ff3311':i>=n-3?'#ffaa00':t.color;segs[i].style.background=lit?c:'#8090a0';segs[i].style.boxShadow=lit?`0 0 2px ${c}`:'';}
}

function dots(){
  document.getElementById('dr').className='dot'+(T.some(t=>t.recording)?' rec':'');

}

  card.querySelector('.tn-wow').addEventListener('input',e=>{t.wow=e.target.value/100;if(t.chain) t.chain.setWow(t.wow);card.querySelector('.tv-wow').textContent=Math.round(t.wow*100)+'%';});
  card.querySelector('.tn-degrade').addEventListener('input',e=>{t.degrade=e.target.value/100;if(t.chain) t.chain.setDegrade(t.degrade);card.querySelector('.tv-degrade').textContent=Math.round(t.degrade*100)+'%';});
  card.querySelector('.tn-bw').addEventListener('input',e=>{t.bw=e.target.value/100;if(t.chain) t.chain.setBW(t.bw);card.querySelector('.tv-bw').textContent=Math.round(t.bw*100)+'%';});
  ['lo','lmid','hmid','hi'].forEach(band=>{
    card.querySelector('.eq-'+band).addEventListener('input',e=>{
      t.eq[band]=parseFloat(e.target.value);if(t.chain) t.chain.setEQ(band,t.eq[band]);
      const v=t.eq[band];card.querySelector('.ev-'+band).textContent=(v>=0?'+':'')+v.toFixed(1)+'dB';
    });
  });
  card.querySelector('.btn-rec').addEventListener('click',()=>t.recording?recStop(t):recStart(t));
  card.querySelector('.btn-load').addEventListener('click',()=>{ctx();fi.click();});
  card.querySelector('.btn-play').addEventListener('click',()=>{if(t.buf) t.playing?stopT(t):playT(t);});
  card.querySelector('.btn-stop').addEventListener('click',()=>stopT(t));
  card.querySelector('.btn-loop').addEventListener('click',()=>{t.loop=!t.loop;if(t.src) t.src.loop=t.loop||globalLoop;render(t);});
  card.querySelector('.btn-mute').addEventListener('click',()=>{t.mute=!t.mute;updateMutes();render(t);});
  card.querySelector('.btn-solo').addEventListener('click',()=>{t.solo=!t.solo;updateMutes();render(t);});
  card.querySelector('.btn-clr').addEventListener('click',()=>{stopT(t);t.buf=null;t.name=null;render(t);});
  scroll.appendChild(card);
});

// Init EQ panel with first track
buildEQPanel(T[0]);

/* MASTER */
document.getElementById('ba-play').addEventListener('click',()=>{ctx();T.forEach(t=>{if(t.buf&&!t.playing) playT(t);});});
document.getElementById('ba-stop').addEventListener('click',()=>T.forEach(stopT));
document.getElementById('ba-rec').addEventListener('click',()=>{const any=T.some(t=>t.recording);if(any) T.forEach(t=>{if(t.recording) recStop(t);});else T.forEach(t=>recStart(t));});
document.getElementById('ba-loop').addEventListener('click',function(){globalLoop=!globalLoop;this.className='mbtn'+(globalLoop?' al':'');T.forEach(t=>{if(t.src) t.src.loop=t.loop||globalLoop;});});
['n','w','d','b'].forEach(p=>{document.getElementById('sl-'+p).addEventListener('input',e=>{document.getElementById('v'+p).textContent=e.target.value+'%';applyGlobalTape();});});
document.getElementById('btn-save').addEventListener('click',saveProject);
document.getElementById('btn-load-proj').addEventListener('click',loadProject);
document.getElementById('btn-bounce').addEventListener('click',showBounce);

dots();
</script>
