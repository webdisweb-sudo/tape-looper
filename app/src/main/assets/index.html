<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TAPE LOOPER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#b0b8c0;--panel:#c8d0d8;--panel2:#d8e0e8;--panel3:#e4ecf4;
  --border:#8898a8;--border2:#98a8b8;
  --shadow:rgba(50,60,70,0.3);--hi:rgba(255,255,255,0.75);
  --amber:#c87800;--amber2:#a06000;--amberbg:#fff8ee;
  --red:#cc2200;--green:#227700;--blue:#0055cc;--purple:#7700cc;
  --txt:#182028;--txt2:#304050;--txt3:#607080;
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--txt);font-family:'Courier New',monospace;overflow:hidden}

/* ── APP SHELL ── */
#app{height:100vh;width:100vw;display:flex;flex-direction:column;background:linear-gradient(160deg,#c8d4dc,#a8b8c4)}

/* ── HEADER ── */
#hdr{background:linear-gradient(180deg,#d0d8e0,#a8b4c0);border-bottom:2px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 2px 4px var(--shadow)}
.logo{font-size:11px;letter-spacing:3px;color:var(--txt2);font-weight:bold;flex:1;text-shadow:0 1px 0 var(--hi)}
.hbtns{display:flex;gap:6px}
.hbtn{padding:6px 12px;font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;border-radius:4px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;box-shadow:0 1px 3px var(--shadow),inset 0 1px 0 var(--hi);min-height:36px}
.hbtn:active{background:linear-gradient(180deg,var(--panel),var(--panel3));box-shadow:inset 0 2px 4px var(--shadow)}
.hbtn.bounce{border-color:var(--purple);color:var(--purple)}
.dots{display:flex;gap:6px;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;background:#8090a0;border:1px solid var(--border);box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);transition:all .2s}
.dot.rec{background:#ff3311;box-shadow:0 0 7px #ff3311}
.dot.play{background:#ffaa00;box-shadow:0 0 7px #ffaa00}

/* ── MASTER BAR ── */
#mbar{background:linear-gradient(180deg,#c0ccd4,#b0bcc8);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.mlbl{font-size:8px;color:var(--txt3);letter-spacing:2px;font-weight:bold}
.mvu{display:flex;gap:2px;align-items:flex-end}
.mvb{width:5px;border-radius:1px;background:#8090a0;border:1px solid #607080;transition:background .05s}
.mbtns{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.mbtn{padding:7px 12px;font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;border-radius:4px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;min-height:38px;box-shadow:0 1px 3px var(--shadow),inset 0 1px 0 var(--hi)}
.mbtn:active{box-shadow:inset 0 2px 4px var(--shadow)}
.mbtn.ap{background:linear-gradient(180deg,#fff8e0,#ffe8a0);border-color:var(--amber);color:var(--amber2)}
.mbtn.ar{background:linear-gradient(180deg,#fff0ee,#ffcccc);border-color:var(--red);color:var(--red)}
.mbtn.al{background:linear-gradient(180deg,#eeffee,#ccffcc);border-color:var(--green);color:var(--green)}

/* ── GLOBAL TAPE ── */
#tpar{background:linear-gradient(180deg,#bcc8d0,#aab8c4);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;gap:16px;align-items:center;flex-shrink:0;overflow-x:auto}
.pg{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.pl{font-size:8px;color:var(--txt3);letter-spacing:1px;font-weight:bold}
.pv{font-size:8px;color:var(--amber2);font-weight:bold}
input[type=range].ps{-webkit-appearance:none;appearance:none;height:4px;width:70px;background:linear-gradient(180deg,#7888a0,#98a8b8);border-radius:2px;outline:none;box-shadow:inset 0 1px 3px rgba(0,0,0,0.4)}
input[type=range].ps::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#e8f0f8,#8090a0);border:1px solid var(--border);cursor:pointer;box-shadow:0 2px 4px var(--shadow)}

/* ── TRACK LIST ── */
#scroll{flex:1;overflow:hidden;padding:7px;display:flex;flex-direction:column;gap:6px;touch-action:pan-y}

/* ── TRACK CARD (compact, list view) ── */
.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:8px;border:1px solid var(--border);box-shadow:0 2px 5px var(--shadow),inset 0 1px 0 var(--hi);cursor:pointer;transition:border-color .2s}
.card:active{background:linear-gradient(180deg,var(--panel),var(--panel2))}
.card.hb{border-color:#6090a8}
.card.ip{border-color:var(--amber)}
.card.ir{border-color:var(--red)}
.card-row{display:flex;align-items:center;gap:10px;padding:11px 12px}
.tnum{font-size:13px;font-weight:bold;min-width:32px;text-shadow:0 1px 0 var(--hi)}
.tname{font-size:10px;color:var(--txt2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tvrow{display:flex;gap:2px}
.vs{height:11px;width:12px;border-radius:1px;background:#8090a0;border:1px solid #607080;transition:background .04s}
.tstat{width:9px;height:9px;border-radius:50%;background:#8090a0;border:1px solid var(--border);box-shadow:inset 0 1px 2px rgba(0,0,0,0.4);flex-shrink:0}
.tstat.rec{background:#ff3311;box-shadow:0 0 5px #ff3311}
.tstat.play{background:#ffaa00;box-shadow:0 0 5px #ffaa00}
.card-arr{font-size:11px;color:var(--txt3)}

/* ── FOOTER ── */
#foot{border-top:2px solid var(--border);padding:5px 12px;display:flex;gap:10px;font-size:9px;color:var(--txt3);flex-shrink:0;background:linear-gradient(180deg,#b0bcc8,#a0b0bc);flex-wrap:wrap;align-items:center}
.screw{width:10px;height:10px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#d0d8e0,#7080908);border:1px solid var(--border);box-shadow:0 1px 2px var(--shadow);flex-shrink:0}

/* ── TRACK DETAIL VIEW (fullscreen) ── */
#track-view{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:50;flex-direction:column;background:linear-gradient(160deg,#c8d4dc,#a8b8c4)}
#track-view.show{display:flex}
#tv-header{background:linear-gradient(180deg,#d0d8e0,#a8b4c0);border-bottom:2px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;box-shadow:0 2px 4px var(--shadow)}
#tv-back{padding:8px 14px;font-family:'Courier New',monospace;font-size:11px;border-radius:4px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;box-shadow:0 1px 3px var(--shadow),inset 0 1px 0 var(--hi);min-height:40px}
#tv-title{font-size:13px;font-weight:bold;letter-spacing:2px;text-shadow:0 1px 0 var(--hi)}
#tv-scroll{flex:1;overflow:hidden;padding:10px;display:flex;flex-direction:column;gap:0;touch-action:pan-y}
#tv-scroll-inner{display:flex;flex-direction:column;gap:8px}

/* ── DETAIL SECTIONS ── */
.dsec{background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:8px;border:1px solid var(--border);padding:14px 16px;box-shadow:0 2px 5px var(--shadow),inset 0 1px 0 var(--hi)}
.dsec-title{font-size:8px;color:var(--txt3);letter-spacing:3px;font-weight:bold;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border2)}

/* ── BIG SLIDERS ── */
.drow{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.drow:last-child{margin-bottom:0}
.dlbl{font-size:10px;color:var(--txt2);min-width:68px;font-weight:bold;letter-spacing:1px}
input[type=range].big{-webkit-appearance:none;appearance:none;flex:1;height:6px;background:linear-gradient(180deg,#7888a0,#98a8b8);border-radius:3px;outline:none;box-shadow:inset 0 2px 4px rgba(0,0,0,0.4)}
input[type=range].big::-webkit-slider-thumb{-webkit-appearance:none;width:32px;height:32px;border-radius:6px;background:radial-gradient(circle at 35% 25%,#e8f4fc,#8898a8);border:1px solid var(--border);cursor:pointer;box-shadow:0 3px 6px var(--shadow),inset 0 1px 0 var(--hi)}
.dval{font-size:11px;color:var(--txt2);min-width:44px;text-align:right;font-weight:bold}

/* ── EQ BANDS ── */
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.eq-band{background:linear-gradient(180deg,var(--panel3),var(--panel2));border-radius:6px;padding:10px 12px;border:1px solid var(--border)}
.eq-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.eq-lbl{font-size:9px;color:var(--txt3);font-weight:bold}
.eq-val{font-size:10px;color:var(--blue);font-weight:bold}
input[type=range].eq-sl{-webkit-appearance:none;appearance:none;width:100%;height:5px;background:linear-gradient(180deg,#7888a0,#98a8b8);border-radius:3px;outline:none;box-shadow:inset 0 1px 3px rgba(0,0,0,0.4)}
input[type=range].eq-sl::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 25%,#e8f4fc,#8898a8);border:1px solid var(--border);cursor:pointer;box-shadow:0 2px 5px var(--shadow)}

/* ── TRANSPORT BUTTONS ── */
.tbrow{display:flex;gap:8px;flex-wrap:wrap}
.tbig{padding:12px 16px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;border-radius:5px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;min-height:46px;box-shadow:0 2px 4px var(--shadow),inset 0 1px 0 var(--hi);flex:1;min-width:70px;text-align:center}
.tbig:active{background:linear-gradient(180deg,var(--panel),var(--panel3));box-shadow:inset 0 2px 4px var(--shadow)}
.tbig.armed{background:linear-gradient(180deg,#fff0ee,#ffcccc);border-color:var(--red);color:var(--red);box-shadow:0 0 6px #ff220033,0 2px 4px var(--shadow)}
.tbig.playing{background:linear-gradient(180deg,#fff8e0,#ffe8a0);border-color:var(--amber);color:var(--amber2)}
.tbig.looping{background:linear-gradient(180deg,#eeffee,#ccffcc);border-color:var(--green);color:var(--green)}
.tbig.muted{background:linear-gradient(180deg,#fff0ee,#ffcccc);border-color:var(--red);color:var(--red)}
.tbig.soloed{background:linear-gradient(180deg,#fffff0,#ffeeaa);border-color:#aa8800;color:#886600}
.tbig.dis{opacity:.35;pointer-events:none}

/* ── BOUNCE OVERLAY ── */
#bounce-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(70,90,110,0.7);z-index:100;align-items:center;justify-content:center}
#bounce-overlay.show{display:flex}
.bounce-box{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid var(--border);border-radius:10px;padding:22px 26px;text-align:center;max-width:320px;width:90%;box-shadow:0 8px 24px var(--shadow),inset 0 1px 0 var(--hi)}
.bounce-title{font-size:12px;color:var(--txt2);letter-spacing:3px;margin-bottom:14px;font-weight:bold}
.bprog{width:100%;height:6px;background:linear-gradient(180deg,#7888a0,#98a8b8);border-radius:3px;overflow:hidden;margin:10px 0;box-shadow:inset 0 2px 3px rgba(0,0,0,0.4)}
.bprog-fill{height:100%;background:linear-gradient(90deg,var(--amber2),var(--amber));width:0%;transition:width .1s}
.bbrow{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.bbtn{padding:10px 16px;font-family:'Courier New',monospace;font-size:10px;border-radius:4px;border:1px solid var(--border);background:linear-gradient(180deg,var(--panel3),var(--panel));color:var(--txt2);cursor:pointer;min-height:42px;box-shadow:0 1px 3px var(--shadow),inset 0 1px 0 var(--hi)}
.bbtn.primary{background:linear-gradient(180deg,#fff8e0,#ffe0a0);border-color:var(--amber);color:var(--amber2)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="screw"></div>
    <span class="logo">TAPE LOOPER 8-TRACK</span>
    <div class="hbtns">
      <button class="hbtn" id="btn-save">💾 SAVE</button>
      <button class="hbtn" id="btn-load-proj">📂 OPEN</button>
      <button class="hbtn bounce" id="btn-bounce">⬇ BOUNCE</button>
    </div>
    <div class="dots"><div class="dot" id="dr"></div><div class="dot" id="dp"></div></div>
    <div class="screw"></div>
  </div>

  <div id="mbar">
    <span class="mlbl">MASTER</span>
    <div class="mvu" id="vul"></div>
    <div class="mvu" id="vur"></div>
    <div class="mbtns">
      <button class="mbtn" id="ba-play">▶ ALL</button>
      <button class="mbtn" id="ba-stop">■ STOP</button>
      <button class="mbtn" id="ba-rec">● REC</button>
      <button class="mbtn" id="ba-loop">∞ LOOP</button>
    </div>
  </div>

  <div id="tpar">
    <span class="mlbl">GLOBAL TAPE</span>
    <div class="pg"><span class="pl">NOISE</span><input type="range" class="ps" id="sl-n" min="0" max="100" value="25"><span class="pv" id="vn">25%</span></div>
    <div class="pg"><span class="pl">WOW</span><input type="range" class="ps" id="sl-w" min="0" max="100" value="30"><span class="pv" id="vw">30%</span></div>
    <div class="pg"><span class="pl">DEGRADE</span><input type="range" class="ps" id="sl-d" min="0" max="100" value="0"><span class="pv" id="vd">0%</span></div>
    <div class="pg"><span class="pl">BW</span><input type="range" class="ps" id="sl-b" min="0" max="100" value="70"><span class="pv" id="vb">70%</span></div>
  </div>

  <div id="scroll"></div>

  <div id="foot">
    <div class="screw"></div>
    <span id="foot-tracks"></span>
    <span style="margin-left:auto">TAPE LOOPER v2.0</span>
    <div class="screw"></div>
  </div>
</div>

<!-- TRACK DETAIL VIEW -->
<div id="track-view">
  <div id="tv-header">
    <button id="tv-back">← BACK</button>
    <span id="tv-title">TR1</span>
    <div class="dots" style="margin-left:auto"><div class="dot" id="tv-dr"></div><div class="dot" id="tv-dp"></div></div>
  </div>
  <div id="tv-scroll">
    <div id="tv-scroll-inner">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- BOUNCE -->
<div id="bounce-overlay">
  <div class="bounce-box">
    <div class="bounce-title">BOUNCE TO FILE</div>
    <div class="bbrow">
      <button class="bbtn primary" onclick="bounceStart('stereo')">🎵 Стерео микс WAV</button>
      <button class="bbtn" onclick="bounceStart('tracks')">🎛 Треки отдельно</button>
    </div>
    <div class="bprog" id="bp-bar" style="display:none"><div class="bprog-fill" id="bp-fill"></div></div>
    <div id="bp-status" style="font-size:9px;color:var(--txt3);margin-top:6px;min-height:16px"></div>
    <div class="bbrow" style="margin-top:8px"><button class="bbtn" onclick="closeBounce()">ЗАКРЫТЬ</button></div>
  </div>
</div>

<script>
'use strict';
const TC=['#c87800','#227700','#0055cc','#881188','#886600','#7700cc','#007766','#cc2200'];
const N=8;
let actx=null,masterGain=null,analL=null,analR=null,globalLoop=false;
let currentTrack=null;

const T=Array.from({length:N},(_,i)=>({
  i,buf:null,src:null,chain:null,mr:null,chunks:[],
  playing:false,recording:false,
  vol:0.8,inputGain:0.7,pan:0,mute:false,solo:false,loop:false,speed:1.0,
  noise:0.2,wow:0.3,degrade:0,bw:0.7,
  eq:{lo:0,lmid:0,hmid:0,hi:0},
  color:TC[i],name:null
}));

function ctx(){
  if(!actx){
    actx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=actx.createGain(); masterGain.gain.value=0.85;
    const sp=actx.createChannelSplitter(2);
    analL=actx.createAnalyser(); analL.fftSize=256;
    analR=actx.createAnalyser(); analR.fftSize=256;
    masterGain.connect(sp);
    sp.connect(analL,0); sp.connect(analR,1);
    analL.connect(actx.destination); analR.connect(actx.destination);
  }
  if(actx.state==='suspended') actx.resume();
  return actx;
}

function buildChain(t){
  if(t.chain) return t.chain;
  const c=ctx();

  // Input gain + saturation
  const inpG=c.createGain(); inpG.gain.value=t.inputGain*2;
  const sat=c.createWaveShaper();
  function makeSat(amt){
    const cv=new Float32Array(512);
    for(let i=0;i<512;i++){const x=(i*2)/512-1;cv[i]=Math.tanh(amt*x)/Math.tanh(amt);}
    return cv;
  }
  sat.curve=makeSat(2); sat.oversample='4x';

  // Tape hiss - soft filtered noise
  const nb=c.createBuffer(1,c.sampleRate*4,c.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=c.createBufferSource(); ns.buffer=nb; ns.loop=true;
  const nfLow=c.createBiquadFilter(); nfLow.type='highpass'; nfLow.frequency.value=800;
  const nfHi=c.createBiquadFilter(); nfHi.type='lowpass'; nfHi.frequency.value=8000;
  const ng=c.createGain(); ng.gain.value=0;
  ns.connect(nfLow); nfLow.connect(nfHi); nfHi.connect(ng); ns.start();

  // Analog degrade: slow level drift + gentle LP roll-off (NO crackle)
  // Level drift LFO (very slow, irregular)
  const driftOsc=c.createOscillator(); driftOsc.type='sine'; driftOsc.frequency.value=0.05;
  const driftGain=c.createGain(); driftGain.gain.value=0;
  const driftDC=c.createConstantSource(); driftDC.offset.value=1;
  // Tape dropouts: slow AM modulation
  const dropOsc=c.createOscillator(); dropOsc.type='sine'; dropOsc.frequency.value=0.13;
  const dropGain=c.createGain(); dropGain.gain.value=0;
  driftOsc.start(); dropOsc.start(); driftDC.start();

  // Signal amplitude modulator for degrade
  const degradeAM=c.createGain(); degradeAM.gain.value=1;
  driftOsc.connect(driftGain); driftGain.connect(degradeAM.gain);
  dropOsc.connect(dropGain); dropGain.connect(degradeAM.gain);
  driftDC.connect(degradeAM.gain);

  // HP/LP
  const hp=c.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=80;
  const lp=c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1000+t.bw*12000;

  // Second LP for degrade (progressively rolls off highs)
  const lp2=c.createBiquadFilter(); lp2.type='lowpass'; lp2.frequency.value=22000;

  // Wow/flutter
  const dl=c.createDelay(0.3); dl.delayTime.value=0.005;
  const w1=c.createOscillator(); w1.frequency.value=0.7+Math.random()*0.5;
  const wd1=c.createGain(); wd1.gain.value=0;
  w1.connect(wd1); wd1.connect(dl.delayTime); w1.start();
  const w2=c.createOscillator(); w2.frequency.value=5.5+Math.random()*2;
  const wd2=c.createGain(); wd2.gain.value=0;
  w2.connect(wd2); wd2.connect(dl.delayTime); w2.start();
  const w3=c.createOscillator(); w3.frequency.value=0.08+Math.random()*0.1;
  const wd3=c.createGain(); wd3.gain.value=0;
  w3.connect(wd3); wd3.connect(dl.delayTime); w3.start();

  // 4-band EQ
  const eqLo=c.createBiquadFilter(); eqLo.type='lowshelf'; eqLo.frequency.value=120;
  const eqLM=c.createBiquadFilter(); eqLM.type='peaking'; eqLM.frequency.value=500; eqLM.Q.value=1.2;
  const eqHM=c.createBiquadFilter(); eqHM.type='peaking'; eqHM.frequency.value=3000; eqHM.Q.value=1.2;
  const eqHi=c.createBiquadFilter(); eqHi.type='highshelf'; eqHi.frequency.value=10000;

  const fdr=c.createGain(); fdr.gain.value=t.vol;
  const panner=c.createStereoPanner(); panner.pan.value=t.pan;
  const mg=c.createGain(); mg.gain.value=1;
  const an=c.createAnalyser(); an.fftSize=256;

  // Signal path: inp → sat → hp → lp → delay → degrade AM → lp2 → EQ → fader → panner → mute → analyser → master
  inpG.connect(sat); sat.connect(hp); hp.connect(lp); lp.connect(dl);
  dl.connect(degradeAM); degradeAM.connect(lp2); lp2.connect(eqLo);
  eqLo.connect(eqLM); eqLM.connect(eqHM); eqHM.connect(eqHi);
  eqHi.connect(fdr); fdr.connect(panner); panner.connect(mg);
  ng.connect(mg);
  mg.connect(an); an.connect(masterGain);

  t.chain={inp:inpG,sat,fdr,panner,mg,an,ng,lp,lp2,wd1,wd2,wd3,driftGain,dropGain,makeSat,
    setVol:v=>{fdr.gain.value=v},
    setPan:v=>{panner.pan.value=v},
    setMute:m=>{mg.gain.value=m?0:1},
    setInputGain:v=>{inpG.gain.value=v*2; sat.curve=makeSat(1+v*4)},
    setNoise:v=>{ng.gain.value=v*0.025},
    setWow:v=>{const b=v*v;wd1.gain.value=b*0.06;wd2.gain.value=b*0.012;wd3.gain.value=b*0.04},
    setDegrade:v=>{
      driftGain.gain.value=v*0.15;
      dropGain.gain.value=v*0.08;
      lp2.frequency.value=22000-v*19000;
      ng.gain.value=(t.noise+v*0.3)*0.025;
    },
    setBW:v=>{lp.frequency.value=1000+v*12000},
    setEQ:(band,v)=>{
      if(band==='lo') eqLo.gain.value=v;
      else if(band==='lmid') eqLM.gain.value=v;
      else if(band==='hmid') eqHM.gain.value=v;
      else if(band==='hi') eqHi.gain.value=v;
    }
  };
  return t.chain;
}

function soloOn(){return T.some(t=>t.solo)}
function updateMutes(){const s=soloOn();T.forEach(t=>{if(t.chain) t.chain.setMute(t.mute||(s&&!t.solo));});}

function applyGlobalTape(){
  const n=+document.getElementById('sl-n').value/100;
  const w=+document.getElementById('sl-w').value/100;
  const d=+document.getElementById('sl-d').value/100;
  const b=+document.getElementById('sl-b').value/100;
  T.forEach(t=>{
    t.noise=n;t.wow=w;t.degrade=d;t.bw=b;
    if(t.chain){t.chain.setNoise(n);t.chain.setWow(w);t.chain.setDegrade(d);t.chain.setBW(b);}
  });
}

function playT(t){
  if(!t.buf) return;
  stopT(t);
  const ch=buildChain(t);
  ch.setVol(t.vol); ch.setInputGain(t.inputGain); ch.setPan(t.pan);
  ch.setNoise(t.noise); ch.setWow(t.wow); ch.setDegrade(t.degrade); ch.setBW(t.bw);
  ['lo','lmid','hmid','hi'].forEach(b=>ch.setEQ(b,t.eq[b]));
  updateMutes();
  const s=ctx().createBufferSource();
  s.buffer=t.buf; s.playbackRate.value=t.speed; s.loop=t.loop||globalLoop;
  s.connect(ch.inp); s._dead=false;
  s.onended=()=>{if(!s._dead){t.playing=false;renderCard(t);renderDetail(t);dots();}};
  s.start(); t.src=s; t.playing=true; renderCard(t); renderDetail(t); dots();
}

function stopT(t){
  if(t.src){t.src._dead=true;try{t.src.stop();}catch(e){}t.src=null;}
  t.playing=false; renderCard(t); renderDetail(t); dots();
}

async function recStart(t){
  ctx();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
    const mr=new MediaRecorder(stream);
    t.chunks=[];
    mr.ondataavailable=e=>t.chunks.push(e.data);
    mr.onstop=async()=>{
      stream.getTracks().forEach(s=>s.stop());
      try{const blob=new Blob(t.chunks,{type:'audio/webm'});const ab=await blob.arrayBuffer();t.buf=await actx.decodeAudioData(ab);t.name='mic-'+(t.i+1);}catch(e){t.name='err';}
      t.recording=false; renderCard(t); renderDetail(t); dots();
    };
    mr.start(); t.mr=mr; t.recording=true; renderCard(t); renderDetail(t); dots();
  }catch(e){alert('Микрофон: '+e.message);}
}
function recStop(t){if(t.mr){t.mr.stop();t.mr=null;}}

/* ── BOUNCE ── */
function showBounce(){document.getElementById('bounce-overlay').className='bounce-overlay show';document.getElementById('bp-bar').style.display='none';document.getElementById('bp-status').textContent='';}
function closeBounce(){document.getElementById('bounce-overlay').className='bounce-overlay';}

async function bounceStart(mode){
  const tracks=T.filter(t=>t.buf);
  if(!tracks.length){alert('Нет треков');return;}
  document.getElementById('bp-bar').style.display='block';
  document.getElementById('bp-fill').style.width='0%';
  document.getElementById('bp-status').textContent='Рендеринг...';
  const SR=44100;
  let maxDur=0; tracks.forEach(t=>{maxDur=Math.max(maxDur,t.buf.duration/t.speed);}); maxDur=Math.min(maxDur,300);
  if(mode==='stereo'){
    const oc=new OfflineAudioContext(2,Math.ceil(maxDur*SR),SR);
    const og=oc.createGain(); og.gain.value=0.85; og.connect(oc.destination);
    const sa=soloOn();
    tracks.forEach(t=>{
      if(t.mute||(sa&&!t.solo)) return;
      const src=oc.createBufferSource(); src.buffer=t.buf; src.playbackRate.value=t.speed;
      const lp=oc.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1000+t.bw*12000;
      const g=oc.createGain(); g.gain.value=t.vol;
      src.connect(lp); lp.connect(g); g.connect(og); src.start(0);
    });
    document.getElementById('bp-fill').style.width='40%';
    const buf=await oc.startRendering();
    document.getElementById('bp-fill').style.width='80%';
    const wav=bufferToWav(buf);
    const b64=await toBase64(wav);
    const fname=projectName+'-mix.wav';
    const r=await saveToDevice(b64,'Export/'+projectName,fname);
    document.getElementById('bp-fill').style.width='100%';
    if(r.startsWith('OK:')) document.getElementById('bp-status').textContent='✓ Сохранено: Music/TapeLooper/Export/'+projectName+'/'+fname;
    else document.getElementById('bp-status').textContent='✓ Готово ('+r+')';
  } else {
    for(let i=0;i<tracks.length;i++){
      const t=tracks[i];
      document.getElementById('bp-fill').style.width=Math.round(i/tracks.length*100)+'%';
      document.getElementById('bp-status').textContent=`Трек ${t.i+1}...`;
      const dur=Math.min(t.buf.duration/t.speed,300);
      const oc=new OfflineAudioContext(2,Math.ceil(dur*SR),SR);
      const src=oc.createBufferSource(); src.buffer=t.buf; src.playbackRate.value=t.speed;
      const g=oc.createGain(); g.gain.value=t.vol;
      src.connect(g); g.connect(oc.destination); src.start(0);
      const buf=await oc.startRendering();
      const wav=bufferToWav(buf);
      const b64=await toBase64(wav);
      const fname=`track-${t.i+1}-${t.name||'tr'}.wav`;
      await saveToDevice(b64,'Export/'+projectName,fname);
      await new Promise(r=>setTimeout(r,300));
    }
    document.getElementById('bp-fill').style.width='100%';
    document.getElementById('bp-status').textContent='✓ Сохранено в Music/TapeLooper/Export/'+projectName;
  }
}

function bufferToWav(buffer){
  const nc=buffer.numberOfChannels,len=buffer.length,sr=buffer.sampleRate;
  const ab=new ArrayBuffer(44+len*nc*2); const v=new DataView(ab);
  function ws(o,s){for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF');v.setUint32(4,36+len*nc*2,true);ws(8,'WAVE');ws(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,nc,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*nc*2,true);v.setUint16(32,nc*2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,len*nc*2,true);
  let o=44;
  for(let i=0;i<len;i++) for(let ch=0;ch<nc;ch++){const s=Math.max(-1,Math.min(1,buffer.getChannelData(ch)[i]));v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true);o+=2;}
  return new Blob([ab],{type:'audio/wav'});
}
function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1000);
}

let projectName = 'untitled';

function projectData(){
  return {version:3,name:projectName,
    gn:document.getElementById('sl-n').value,gw:document.getElementById('sl-w').value,
    gd:document.getElementById('sl-d').value,gb:document.getElementById('sl-b').value,
    tracks:T.map(t=>({i:t.i,vol:t.vol,ig:t.inputGain,pan:t.pan||0,mute:t.mute,solo:t.solo,loop:t.loop,
      speed:t.speed,noise:t.noise,wow:t.wow,degrade:t.degrade,bw:t.bw,eq:t.eq,name:t.name}))
  };
}

function toBase64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(blob);
  });
}

async function saveToDevice(base64,subDir,fileName){
  if(window.AndroidFS){
    const result=window.AndroidFS.saveFile(base64,subDir,fileName);
    return result;
  } else {
    // Fallback for browser testing
    const a=document.createElement('a');
    a.href='data:application/octet-stream;base64,'+base64;
    a.download=fileName; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    return 'OK:downloads/'+fileName;
  }
}

function saveProject(){
  const name=prompt('Имя проекта:', projectName);
  if(!name) return;
  projectName=name.replace(/[^a-zA-Zа-яА-Я0-9_\-]/g,'_');
  const json=JSON.stringify(projectData(),null,2);
  const b64=btoa(unescape(encodeURIComponent(json)));
  saveToDevice(b64,'Projects',projectName+'.json').then(r=>{
    if(r.startsWith('OK:')) alert('✓ Сохранено в\nMusic/TapeLooper/Projects/'+projectName+'.json');

}

const VB=12;
function mkVU(id){const el=document.getElementById(id);if(!el)return;el.innerHTML='';for(let i=0;i<VB;i++){const d=document.createElement('div');d.className='mvb';d.style.height=(3+i*1.7)+'px';el.appendChild(d);}}
function drawVU(anal,id){
  if(!anal)return;
  const d=new Uint8Array(anal.frequencyBinCount);anal.getByteTimeDomainData(d);
  let p=0;for(let i=0;i<d.length;i++) p=Math.max(p,Math.abs(d[i]-128)/128);
  const el=document.getElementById(id);if(!el)return;const ch=el.children;
  for(let i=0;i<VB;i++){const lit=p>i/VB;const c=i>=VB-2?'#ff3311':i>=VB-4?'#ffaa00':'#ffcc44';ch[i].style.background=lit?c:'#8090a0';ch[i].style.boxShadow=lit?`0 0 3px ${c}`:'';}
}
function drawTVU(t){
  if(!t.chain)return;
  const d=new Uint8Array(t.chain.an.frequencyBinCount);t.chain.an.getByteTimeDomainData(d);
  let p=0;for(let i=0;i<d.length;i++) p=Math.max(p,Math.abs(d[i]-128)/128);
  const row=document.getElementById('tv'+t.i);if(!row)return;
  const segs=row.children;const n=segs.length;
  for(let i=0;i<n;i++){const lit=p>i/n;const c=i>=n-2?'#ff3311':i>=n-3?'#ffaa00':t.color;segs[i].style.background=lit?c:'#8090a0';segs[i].style.boxShadow=lit?`0 0 2px ${c}`:'';}
}

    <div class="eq-band"><div class="eq-top"><span class="eq-lbl">LO 120Hz</span><span class="eq-val ev-lo">${(t.eq.lo>=0?'+':'')+t.eq.lo.toFixed(1)}dB</span></div><input type="range" class="eq-sl eq-lo" min="-12" max="12" value="${t.eq.lo}" step="0.5"></div>
    <div class="eq-band"><div class="eq-top"><span class="eq-lbl">LO-MID 500Hz</span><span class="eq-val ev-lmid">${(t.eq.lmid>=0?'+':'')+t.eq.lmid.toFixed(1)}dB</span></div><input type="range" class="eq-sl eq-lmid" min="-12" max="12" value="${t.eq.lmid}" step="0.5"></div>
    <div class="eq-band"><div class="eq-top"><span class="eq-lbl">HI-MID 3kHz</span><span class="eq-val ev-hmid">${(t.eq.hmid>=0?'+':'')+t.eq.hmid.toFixed(1)}dB</span></div><input type="range" class="eq-sl eq-hmid" min="-12" max="12" value="${t.eq.hmid}" step="0.5"></div>
    <div class="eq-band"><div class="eq-top"><span class="eq-lbl">HI 10kHz</span><span class="eq-val ev-hi">${(t.eq.hi>=0?'+':'')+t.eq.hi.toFixed(1)}dB</span></div><input type="range" class="eq-sl eq-hi" min="-12" max="12" value="${t.eq.hi}" step="0.5"></div>
  </div>`;
  ['lo','lmid','hmid','hi'].forEach(band=>{
    eqsec.querySelector('.eq-'+band).addEventListener('input',e=>{
      t.eq[band]=parseFloat(e.target.value);if(t.chain) t.chain.setEQ(band,t.eq[band]);
      const v=t.eq[band];eqsec.querySelector('.ev-'+band).textContent=(v>=0?'+':'')+v.toFixed(1)+'dB';
    });
  });
  inner.appendChild(eqsec);

  // Init JS scroll for detail view
  initTVScroll();
}

/* ── JS SCROLL for main list ── */
(function(){
  const el=document.getElementById('scroll');
  let startY=0,startTop=0,scrollTop=0,maxScroll=0,wrapper=null;
  wrapper=document.createElement('div');
  wrapper.style.cssText='flex:1;overflow:hidden;position:relative;';
  el.parentNode.insertBefore(wrapper,el);
  wrapper.appendChild(el);
  el.style.cssText='position:absolute;top:0;left:0;right:0;overflow:visible;padding:7px;display:flex;flex-direction:column;gap:6px;';

  function updateMax(){maxScroll=Math.max(0,el.scrollHeight-wrapper.clientHeight);}
  el.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;startTop=scrollTop;updateMax();},{passive:true});
  el.addEventListener('touchmove',e=>{
    const dy=startY-e.touches[0].clientY;
    scrollTop=Math.max(0,Math.min(maxScroll,startTop+dy));
    el.style.transform=`translateY(-${scrollTop}px)`;
    e.preventDefault();
  },{passive:false});
  window.addEventListener('resize',()=>{scrollTop=0;el.style.transform='translateY(0)';setTimeout(updateMax,200);});
})();

/* ── JS SCROLL for detail view ── */
let tvScrollTop=0,tvInner=null,tvWrapper=null;
function initTVScroll(){
  tvInner=document.getElementById('tv-scroll-inner');
  tvWrapper=document.getElementById('tv-scroll');
  tvScrollTop=0;
  tvInner.style.transform='translateY(0)';
  // Set wrapper styles
  tvWrapper.style.cssText='flex:1;overflow:hidden;position:relative;padding:0;';
  tvInner.style.position='absolute';
  tvInner.style.top='0';
  tvInner.style.left='10px';
  tvInner.style.right='10px';
  tvInner.style.overflow='visible';
  tvInner.style.display='flex';
  tvInner.style.flexDirection='column';
  tvInner.style.gap='8px';
  tvInner.style.paddingBottom='20px';

  // Remove old listeners by cloning
  const newInner=tvInner.cloneNode(true);
  // Can't clone with events — use wrapper for touch
  if(!tvWrapper._scrollInit){
    tvWrapper._scrollInit=true;
    tvWrapper.addEventListener('touchstart',e=>{
      tvScrollTop=parseInt(tvInner.style.transform.replace('translateY(',''))||0;
      tvScrollTop=Math.abs(tvScrollTop);
      tvWrapper._startY=e.touches[0].clientY;
      tvWrapper._startTop=tvScrollTop;
      const max=Math.max(0,tvInner.scrollHeight-tvWrapper.clientHeight);
      tvWrapper._max=max;
    },{passive:true});
    tvWrapper.addEventListener('touchmove',e=>{
      const dy=tvWrapper._startY-e.touches[0].clientY;
      tvScrollTop=Math.max(0,Math.min(tvWrapper._max,tvWrapper._startTop+dy));
      tvInner.style.transform=`translateY(-${tvScrollTop}px)`;
      e.preventDefault();
    },{passive:false});
  }
}

/* ── MASTER ── */
document.getElementById('ba-play').addEventListener('click',()=>{ctx();T.forEach(t=>{if(t.buf&&!t.playing) playT(t);});});
document.getElementById('ba-stop').addEventListener('click',()=>T.forEach(stopT));
document.getElementById('ba-rec').addEventListener('click',()=>{const any=T.some(t=>t.recording);if(any) T.forEach(t=>{if(t.recording) recStop(t);});else T.forEach(t=>recStart(t));});
document.getElementById('ba-loop').addEventListener('click',function(){globalLoop=!globalLoop;this.className='mbtn'+(globalLoop?' al':'');T.forEach(t=>{if(t.src) t.src.loop=t.loop||globalLoop;});});
['n','w','d','b'].forEach(p=>{document.getElementById('sl-'+p).addEventListener('input',e=>{document.getElementById('v'+p).textContent=e.target.value+'%';applyGlobalTape();});});

document.getElementById('btn-load-proj').addEventListener('click',loadProject);
document.getElementById('btn-bounce').addEventListener('click',showBounce);

dots();
