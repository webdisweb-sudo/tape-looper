<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TAPE LOOPER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1a1a1a;--panel:#242424;--panel2:#2e2e2e;
  --border:#404040;--border2:#505050;
  --amber:#f0a030;--amber2:#c07818;
  --red:#ff4444;--green:#66cc44;--blue:#44aaff;
  --txt:#e0d8cc;--txt2:#b0a898;--txt3:#706860;
  --knob:#383828;--knobhi:#504838
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--txt);font-family:'Courier New',monospace;overflow:hidden;touch-action:none;font-size:13px}
#app{height:100vh;width:100vw;display:flex;flex-direction:column}

/* HEADER */
#hdr{background:linear-gradient(180deg,#303028,#242420);border-bottom:2px solid var(--amber2);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:13px;letter-spacing:4px;color:var(--amber);font-weight:bold}
.sub{font-size:9px;letter-spacing:3px;color:var(--txt3)}
.dots{display:flex;gap:7px;align-items:center}
.dot{width:8px;height:8px;border-radius:50%;background:#303030;transition:all .2s}
.dot.rec{background:var(--red);box-shadow:0 0 8px var(--red)}
.dot.play{background:var(--amber);box-shadow:0 0 8px var(--amber)}

/* MASTER BAR */
#mbar{background:var(--panel);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.mlbl{font-size:8px;color:var(--txt3);letter-spacing:2px}
.mvu{display:flex;gap:2px;align-items:flex-end}
.mvb{width:6px;border-radius:1px;background:#181818;transition:background .05s}
.mbtns{display:flex;gap:6px;margin-left:auto}
.mbtn{padding:6px 11px;font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;border-radius:4px;border:1px solid var(--border2);background:var(--panel2);color:var(--txt2);cursor:pointer;transition:all .12s}
.mbtn:active{opacity:.7}
.mbtn.ap{border-color:var(--amber);color:var(--amber);background:#302818;box-shadow:0 0 8px #f0a03033}
.mbtn.ar{border-color:var(--red);color:var(--red);background:#301818;box-shadow:0 0 8px #ff444433}
.mbtn.al{border-color:var(--green);color:var(--green);background:#182818}

/* SCROLL */
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:8px;display:flex;flex-direction:column;gap:7px}
#scroll::-webkit-scrollbar{width:3px}
#scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* TRACK CARD */
.card{background:var(--panel);border-radius:8px;border:1px solid var(--border);padding:0;overflow:hidden;transition:border-color .2s}
.card.hb{border-color:#404830}
.card.ip{border-color:var(--amber2)}
.card.ir{border-color:#603030}

/* TRACK HEADER */
.thdr{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--panel2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.tnum{font-size:12px;font-weight:bold;min-width:30px}
.tname{font-size:10px;color:var(--txt2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tvrow{display:flex;gap:2px}
.vs{height:11px;width:13px;border-radius:1px;background:#181818;transition:background .04s}
.tstat{width:8px;height:8px;border-radius:50%;background:#282828;flex-shrink:0}
.tstat.rec{background:var(--red);box-shadow:0 0 5px var(--red)}
.tstat.play{background:var(--amber);box-shadow:0 0 5px var(--amber)}
.expand-arr{font-size:10px;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.expand-arr.open{transform:rotate(180deg)}

/* TRACK BODY */
.tbody{display:none;padding:8px 10px;display:flex;flex-direction:column;gap:7px}
.tbody.collapsed{display:none}

/* FADER ROW */
.frow{display:flex;align-items:center;gap:8px}
.flbl{font-size:8px;color:var(--txt3);min-width:28px;letter-spacing:1px}
input[type=range].fdr{-webkit-appearance:none;appearance:none;flex:1;height:5px;background:var(--border);border-radius:3px;outline:none}
input[type=range].fdr::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:4px;background:linear-gradient(180deg,#585040,#302820);border:1px solid #806040;cursor:pointer;box-shadow:0 2px 5px #00000088}
.fval{font-size:9px;color:var(--txt2);min-width:36px;text-align:right}

/* SMALL SLIDER */
input[type=range].ss{-webkit-appearance:none;appearance:none;flex:1;height:3px;background:var(--border);border-radius:2px;outline:none}
input[type=range].ss::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--knobhi),var(--knob));border:1px solid var(--border2);cursor:pointer}

/* SECTION LABEL */
.sec{font-size:8px;color:var(--txt3);letter-spacing:3px;padding:2px 0 4px;border-bottom:1px solid var(--border);margin-bottom:2px}

/* BUTTONS ROW */
.brow{display:flex;gap:5px;flex-wrap:wrap}
.tb{padding:7px 10px;font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;border-radius:4px;border:1px solid var(--border2);background:var(--panel2);color:var(--txt2);cursor:pointer;transition:all .12s;white-space:nowrap}
.tb:active{transform:scale(.95)}
.tb.armed{border-color:var(--red);color:var(--red);background:#301818;box-shadow:0 0 6px #ff444433}
.tb.playing{border-color:var(--amber);color:var(--amber);background:#302010}
.tb.looping{border-color:var(--green);color:var(--green);background:#182010}
.tb.muted{border-color:var(--red);color:var(--red);background:#281818}
.tb.soloed{border-color:#ddcc44;color:#ddcc44;background:#282010}
.tb.dis{opacity:.35;pointer-events:none}

/* EQ GRID */
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.eq-band{display:flex;flex-direction:column;gap:3px;background:var(--panel2);border-radius:5px;padding:6px 8px;border:1px solid var(--border)}
.eq-lbl{font-size:8px;color:var(--txt3);letter-spacing:1px}
.eq-val{font-size:9px;color:var(--blue);text-align:right}
.eq-row{display:flex;align-items:center;gap:5px}

/* FOOTER */
#foot{border-top:1px solid var(--border);padding:5px 12px;display:flex;gap:10px;font-size:8px;color:var(--txt3);flex-shrink:0;flex-wrap:wrap;background:var(--panel)}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <span class="logo">TAPE LOOPER</span>
    <span class="sub">8-TRACK MIXER</span>
    <div class="dots"><div class="dot" id="dr"></div><div class="dot" id="dp"></div></div>
  </div>
  <div id="mbar">
    <span class="mlbl">MASTER</span>
    <div class="mvu" id="vul"></div>
    <div class="mvu" id="vur"></div>
    <div class="mbtns">
      <button class="mbtn" id="ba-play">▶ ALL</button>
      <button class="mbtn" id="ba-stop">■ STOP</button>
      <button class="mbtn" id="ba-rec">● REC</button>
      <button class="mbtn" id="ba-loop">∞ LOOP</button>
    </div>
  </div>
  <div id="scroll"></div>
  <div id="foot"></div>
</div>

<script>
'use strict';
const TC=['#f0a030','#66cc44','#44aaff','#cc44aa','#ddcc44','#aa44ff','#44ddaa','#ff6644'];
const N=8;
let actx=null,masterGain=null,analL=null,analR=null,globalLoop=false;

const T=Array.from({length:N},(_,i)=>({
  i,buf:null,src:null,chain:null,mr:null,chunks:[],
  playing:false,recording:false,
  vol:0.8,inputGain:0.7,mute:false,solo:false,loop:false,speed:1.0,
  noise:0.2,wow:0.3,bw:0.7,
  eq:{lo:0,lmid:0,hmid:0,hi:0},
  color:TC[i],expanded:false,name:null
}));

function ctx(){
  if(!actx){
    actx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=actx.createGain(); masterGain.gain.value=0.85;
    const sp=actx.createChannelSplitter(2);
    analL=actx.createAnalyser(); analL.fftSize=256;
    analR=actx.createAnalyser(); analR.fftSize=256;
    masterGain.connect(sp);
    sp.connect(analL,0); sp.connect(analR,1);
    analL.connect(actx.destination); analR.connect(actx.destination);
  }
  if(actx.state==='suspended') actx.resume();
  return actx;
}

/* ── TAPE+EQ CHAIN per track ── */
function buildChain(t){
  if(t.chain) return t.chain;
  const c=ctx();

  // Input gain + soft saturation
  const inpGain=c.createGain(); inpGain.gain.value=t.inputGain*2;
  const ws=c.createWaveShaper();
  function makeCurve(amt){
    const cv=new Float32Array(256);
    for(let i=0;i<256;i++){
      const x=(i*2)/256-1;
      cv[i]=(Math.PI+amt)*x/(Math.PI+amt*Math.abs(x));
    }
    return cv;
  }
  ws.curve=makeCurve(60); ws.oversample='4x';

  // Tape noise
  const nb=c.createBuffer(1,c.sampleRate*2,c.sampleRate);
  const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
  const ns=c.createBufferSource(); ns.buffer=nb; ns.loop=true;
  const nf=c.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=3000; nf.Q.value=0.5;
  const ng=c.createGain(); ng.gain.value=t.noise*0.02;
  ns.connect(nf); nf.connect(ng); ns.start();

  // Tape HP/LP (bandwidth)
  const hp=c.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=80;
  const lp=c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1000+t.bw*12000;

  // Wow/flutter
  const dl=c.createDelay(0.05); dl.delayTime.value=0.003;
  const w1=c.createOscillator(); w1.frequency.value=0.8;
  const wd=c.createGain(); wd.gain.value=t.wow*0.0015;
  w1.connect(wd); wd.connect(dl.delayTime); w1.start();
  const w2=c.createOscillator(); w2.frequency.value=6.5;
  const fd=c.createGain(); fd.gain.value=t.wow*0.0004;
  w2.connect(fd); fd.connect(dl.delayTime); w2.start();

  // 4-band EQ
  const eqLo=c.createBiquadFilter(); eqLo.type='lowshelf'; eqLo.frequency.value=120; eqLo.gain.value=t.eq.lo;
  const eqLM=c.createBiquadFilter(); eqLM.type='peaking'; eqLM.frequency.value=500; eqLM.Q.value=1.2; eqLM.gain.value=t.eq.lmid;
  const eqHM=c.createBiquadFilter(); eqHM.type='peaking'; eqHM.frequency.value=3000; eqHM.Q.value=1.2; eqHM.gain.value=t.eq.hmid;
  const eqHi=c.createBiquadFilter(); eqHi.type='highshelf'; eqHi.frequency.value=10000; eqHi.gain.value=t.eq.hi;

  // Channel fader + mute
  const fdr=c.createGain(); fdr.gain.value=t.vol;
  const mg=c.createGain(); mg.gain.value=1;

  // Analyser
  const an=c.createAnalyser(); an.fftSize=256;

  // Signal path
  inpGain.connect(ws);
  ws.connect(hp); hp.connect(lp); lp.connect(dl); dl.connect(eqLo);
  eqLo.connect(eqLM); eqLM.connect(eqHM); eqHM.connect(eqHi);
  eqHi.connect(fdr); fdr.connect(mg);
  // Noise into mute
  ng.connect(mg);
  mg.connect(an); an.connect(masterGain);

  t.chain={
    inp:inpGain,ws,fdr,mg,an,ng,lp,wd,fd,eqLo,eqLM,eqHM,eqHi,inpGain,
    makeCurve,
    setVol:v=>{fdr.gain.value=v},
    setMute:m=>{mg.gain.value=m?0:1},
    setInputGain:v=>{inpGain.gain.value=v*2; ws.curve=makeCurve(40+v*120)},
    setNoise:v=>{ng.gain.value=v*0.022},
    setWow:v=>{wd.gain.value=v*0.0015;fd.gain.value=v*0.0004},
    setBW:v=>{lp.frequency.value=1000+v*12000},
    setEQ:(band,v)=>{
      if(band==='lo') eqLo.gain.value=v;
      else if(band==='lmid') eqLM.gain.value=v;
      else if(band==='hmid') eqHM.gain.value=v;
      else if(band==='hi') eqHi.gain.value=v;
    }
  };
  return t.chain;
}

function soloOn(){return T.some(t=>t.solo)}
function updateMutes(){
  const s=soloOn();
  T.forEach(t=>{if(t.chain) t.chain.setMute(t.mute||(s&&!t.solo));});
}

/* ── TRANSPORT ── */
function play(t){
  if(!t.buf) return;
  stopTrack(t);
  const ch=buildChain(t);
  ch.setVol(t.vol); ch.setInputGain(t.inputGain);
  ch.setNoise(t.noise); ch.setWow(t.wow); ch.setBW(t.bw);
  ch.setEQ('lo',t.eq.lo); ch.setEQ('lmid',t.eq.lmid);
  ch.setEQ('hmid',t.eq.hmid); ch.setEQ('hi',t.eq.hi);
  updateMutes();
  const s=ctx().createBufferSource();
  s.buffer=t.buf; s.playbackRate.value=t.speed;
  s.loop=t.loop||globalLoop; s.connect(ch.inp);
  s._dead=false;
  s.onended=()=>{if(!s._dead){t.playing=false;render(t);dots();}};
  s.start(); t.src=s; t.playing=true;
  render(t); dots();
}

function stopTrack(t){
  if(t.src){t.src._dead=true;try{t.src.stop();}catch(e){}t.src=null;}
  t.playing=false; render(t); dots();
}

async function recStart(t){
  ctx();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false},video:false});
    const mr=new MediaRecorder(stream);
    t.chunks=[];
    mr.ondataavailable=e=>t.chunks.push(e.data);
    mr.onstop=async()=>{
      stream.getTracks().forEach(s=>s.stop());
      try{
        const blob=new Blob(t.chunks,{type:'audio/webm'});
        const ab=await blob.arrayBuffer();
        t.buf=await actx.decodeAudioData(ab);
        t.name='mic-'+(t.i+1);
      }catch(e){t.name='rec-err';}
      t.recording=false; render(t); dots();
    };
    mr.start(); t.mr=mr; t.recording=true; render(t); dots();
  }catch(e){
    alert('Микрофон недоступен.\n\n'+e.message+'\n\nИспользуйте кнопку LOAD для загрузки файла.');
  }
}

function recStop(t){
  if(t.mr){t.mr.stop();t.mr=null;}
  t.recording=false; render(t); dots();
}

/* ── VU ── */
const VB=12;
function mkVU(id){
  const el=document.getElementById(id); if(!el) return; el.innerHTML='';
  for(let i=0;i<VB;i++){
    const d=document.createElement('div');
    d.className='mvb'; d.style.height=(4+i*1.8)+'px'; el.appendChild(d);
  }
}
function drawVU(anal,id){
  if(!anal) return;
  const d=new Uint8Array(anal.frequencyBinCount);
  anal.getByteTimeDomainData(d);
  let p=0; for(let i=0;i<d.length;i++) p=Math.max(p,Math.abs(d[i]-128)/128);
  const el=document.getElementById(id); if(!el) return;
  const ch=el.children;
  for(let i=0;i<VB;i++){
    const lit=p>i/VB;
    const c=i>=VB-2?'#ff4444':i>=VB-4?'#ffaa00':'#f0a030';
    ch[i].style.background=lit?c:'#181818';
    ch[i].style.boxShadow=lit?`0 0 3px ${c}88`:'none';
  }
}
function drawTVU(t){
  if(!t.chain) return;
  const d=new Uint8Array(t.chain.an.frequencyBinCount);
  t.chain.an.getByteTimeDomainData(d);
  let p=0; for(let i=0;i<d.length;i++) p=Math.max(p,Math.abs(d[i]-128)/128);
  const row=document.getElementById('tv'+t.i); if(!row) return;
  const segs=row.children; const n=segs.length;
  for(let i=0;i<n;i++){
    const lit=p>i/n;
    const c=i>=n-2?'#ff4444':i>=n-3?'#ffaa00':t.color;
    segs[i].style.background=lit?c:'#181818';
    segs[i].style.boxShadow=lit?`0 0 2px ${c}88`:'none';
  }
}
mkVU('vul'); mkVU('vur');
(function vuLoop(){
  drawVU(analL,'vul'); drawVU(analR,'vur');
  T.forEach(drawTVU);
  requestAnimationFrame(vuLoop);
})();

/* ── RENDER ── */
function db(v){return v<=0?'-∞':(20*Math.log10(v)).toFixed(0)+'dB';}
function dots(){
  document.getElementById('dr').className='dot'+(T.some(t=>t.recording)?' rec':'');
  document.getElementById('dp').className='dot'+(T.some(t=>t.playing)?' play':'');
  const f=document.getElementById('foot');
  f.innerHTML=T.map(t=>`<span style="color:${t.recording?'#ff4444':t.playing?t.color:t.buf?'#404830':'#303030'}">${t.recording?'●'+(t.i+1):t.playing?'▶'+(t.i+1):t.buf?'■'+(t.i+1):'_'+(t.i+1)}</span>`).join('')+'<span style="margin-left:auto;color:#404040">WEB AUDIO · 8CH</span>';
}

function render(t){
  const el=document.getElementById('c'+t.i); if(!el) return;
  el.className='card'+(t.buf?' hb':'')+(t.playing?' ip':'')+(t.recording?' ir':'');
  el.querySelector('.tnum').style.color=t.color;
  el.querySelector('.tname').textContent=t.name||(t.buf?'loaded':'no tape');
  const stat=el.querySelector('.tstat');
  stat.className='tstat'+(t.recording?' rec':t.playing?' play':'');

  // fader
  el.querySelector('.fdr').value=t.vol*100;
  el.querySelector('.fdb').textContent=db(t.vol);

  // input gain
  const igEl=el.querySelector('.ig-val');
  if(igEl) igEl.textContent=Math.round(t.inputGain*100)+'%';

  // speed
  const spEl=el.querySelector('.sv');
  if(spEl) spEl.textContent=t.speed.toFixed(2)+'x';

  // tape vals
  ['noise','wow','bw'].forEach(p=>{
    const v=el.querySelector('.tv-'+p); if(v) v.textContent=Math.round(t[p]*100)+'%';
  });

  // eq vals
  ['lo','lmid','hmid','hi'].forEach(b=>{
    const v=el.querySelector('.ev-'+b); if(v) v.textContent=(t.eq[b]>=0?'+':'')+t.eq[b].toFixed(1)+'dB';
  });

  // buttons
  const br=el.querySelector('.btn-rec');
  if(br){br.className='tb btn-rec'+(t.recording?' armed':'');br.textContent=t.recording?'⏺ STOP':'⏺ REC';}
  const bp=el.querySelector('.btn-play');
  if(bp) bp.className='tb btn-play'+(t.buf?t.playing?' playing':'':' dis');
  const bl=el.querySelector('.btn-loop');
  if(bl) bl.className='tb btn-loop'+(t.loop?' looping':'');
  const bm=el.querySelector('.btn-mute');
  if(bm) bm.className='tb btn-mute'+(t.mute?' muted':'');
  const bs=el.querySelector('.btn-solo');
  if(bs) bs.className='tb btn-solo'+(t.solo?' soloed':'');

  // expand arrow
  const arr=el.querySelector('.expand-arr');
  const body=el.querySelector('.tbody');
  if(arr) arr.className='expand-arr'+(t.expanded?' open':'');
  if(body) body.className='tbody'+(t.expanded?'':' collapsed');
}

/* ── BUILD DOM ── */
const scroll=document.getElementById('scroll');

T.forEach(t=>{
  const card=document.createElement('div');
  card.id='c'+t.i; card.className='card';

  card.innerHTML=`
<div class="thdr">
  <span class="tnum" style="color:${t.color}">TR${t.i+1}</span>
  <span class="tname">no tape</span>
  <div class="tvrow" id="tv${t.i}">${Array.from({length:10}).map(()=>'<div class="vs"></div>').join('')}</div>
  <div class="tstat"></div>
  <span class="expand-arr">▼</span>
</div>
<div class="tbody collapsed">
  <div class="frow">
    <span class="flbl">VOL</span>
    <input type="range" class="fdr" min="0" max="100" value="80">
    <span class="fval fdb">-2dB</span>
  </div>
  <div class="frow">
    <span class="flbl">GAIN</span>
    <input type="range" class="ss ig-sl" min="0" max="100" value="70">
    <span class="fval ig-val">70%</span>
  </div>
  <div class="frow">
    <span class="flbl">SPEED</span>
    <input type="range" class="ss spd-sl" min="5" max="100" value="50">
    <span class="fval sv">1.00x</span>
  </div>

  <div class="sec">TAPE</div>
  <div class="frow">
    <span class="flbl">NOISE</span>
    <input type="range" class="ss tn-noise" min="0" max="100" value="20">
    <span class="fval tv-noise">20%</span>
  </div>
  <div class="frow">
    <span class="flbl">WOW</span>
    <input type="range" class="ss tn-wow" min="0" max="100" value="30">
    <span class="fval tv-wow">30%</span>
  </div>
  <div class="frow">
    <span class="flbl">BW</span>
    <input type="range" class="ss tn-bw" min="0" max="100" value="70">
    <span class="fval tv-bw">70%</span>
  </div>

  <div class="sec">4-BAND EQ</div>
  <div class="eq-grid">
    <div class="eq-band">
      <div class="eq-row"><span class="eq-lbl">LO 120Hz</span><span class="eq-val ev-lo">0.0dB</span></div>
      <input type="range" class="ss eq-lo" min="-12" max="12" value="0" step="0.5">
    </div>
    <div class="eq-band">
      <div class="eq-row"><span class="eq-lbl">LO-MID 500Hz</span><span class="eq-val ev-lmid">0.0dB</span></div>
      <input type="range" class="ss eq-lmid" min="-12" max="12" value="0" step="0.5">
    </div>
    <div class="eq-band">
      <div class="eq-row"><span class="eq-lbl">HI-MID 3kHz</span><span class="eq-val ev-hmid">0.0dB</span></div>
      <input type="range" class="ss eq-hmid" min="-12" max="12" value="0" step="0.5">
    </div>
    <div class="eq-band">
      <div class="eq-row"><span class="eq-lbl">HI 10kHz</span><span class="eq-val ev-hi">0.0dB</span></div>
      <input type="range" class="ss eq-hi" min="-12" max="12" value="0" step="0.5">
    </div>
  </div>

  <div class="sec">TRANSPORT</div>
  <div class="brow">
    <button class="tb btn-rec">⏺ REC</button>
    <button class="tb btn-load">📂 LOAD</button>
    <button class="tb btn-play dis">▶ PLAY</button>
    <button class="tb btn-loop">∞ LOOP</button>
    <button class="tb btn-mute">MUTE</button>
    <button class="tb btn-solo">SOLO</button>
    <button class="tb btn-stop">■ STOP</button>
    <button class="tb btn-clr" style="color:#604040">✕ CLR</button>
  </div>
</div>`;

  // File input
  const fi=document.createElement('input');
  fi.type='file'; fi.accept='audio/*'; fi.style.display='none';
  fi.addEventListener('change',async e=>{
    const f=e.target.files[0]; if(!f) return;
    ctx();
    try{
      const ab=await f.arrayBuffer();
      t.buf=await actx.decodeAudioData(ab);
      t.name=f.name.replace(/\.[^.]+$/,'').slice(0,16);
      render(t);
    }catch(e){alert('Ошибка загрузки: '+e.message);}
    fi.value='';
  });
  card.appendChild(fi);

  // Expand
  card.querySelector('.thdr').addEventListener('click',()=>{
    t.expanded=!t.expanded; render(t);
  });

  // Fader
  card.querySelector('.fdr').addEventListener('input',e=>{
    t.vol=e.target.value/100;
    if(t.chain) t.chain.setVol(t.vol);
    card.querySelector('.fdb').textContent=db(t.vol);
  });

  // Input gain
  card.querySelector('.ig-sl').addEventListener('input',e=>{
    t.inputGain=e.target.value/100;
    if(t.chain) t.chain.setInputGain(t.inputGain);
    card.querySelector('.ig-val').textContent=Math.round(t.inputGain*100)+'%';
  });

  // Speed
  card.querySelector('.spd-sl').addEventListener('input',e=>{
    t.speed=e.target.value/50;
    if(t.src) t.src.playbackRate.value=t.speed;
    card.querySelector('.sv').textContent=t.speed.toFixed(2)+'x';
  });

  // Tape params
  card.querySelector('.tn-noise').addEventListener('input',e=>{
    t.noise=e.target.value/100;
    if(t.chain) t.chain.setNoise(t.noise);
    card.querySelector('.tv-noise').textContent=Math.round(t.noise*100)+'%';
  });
  card.querySelector('.tn-wow').addEventListener('input',e=>{
    t.wow=e.target.value/100;
    if(t.chain) t.chain.setWow(t.wow);
    card.querySelector('.tv-wow').textContent=Math.round(t.wow*100)+'%';
  });
  card.querySelector('.tn-bw').addEventListener('input',e=>{
    t.bw=e.target.value/100;
    if(t.chain) t.chain.setBW(t.bw);
    card.querySelector('.tv-bw').textContent=Math.round(t.bw*100)+'%';
  });

  // EQ
  ['lo','lmid','hmid','hi'].forEach(band=>{
    card.querySelector('.eq-'+band).addEventListener('input',e=>{
      t.eq[band]=parseFloat(e.target.value);
      if(t.chain) t.chain.setEQ(band,t.eq[band]);
      const v=t.eq[band];
      card.querySelector('.ev-'+band).textContent=(v>=0?'+':'')+v.toFixed(1)+'dB';
    });
  });

  // Transport buttons
  card.querySelector('.btn-rec').addEventListener('click',()=>t.recording?recStop(t):recStart(t));
  card.querySelector('.btn-load').addEventListener('click',()=>fi.click());
  card.querySelector('.btn-play').addEventListener('click',()=>{if(t.buf) t.playing?stopTrack(t):play(t);});
  card.querySelector('.btn-stop').addEventListener('click',()=>stopTrack(t));
  card.querySelector('.btn-loop').addEventListener('click',()=>{
    t.loop=!t.loop; if(t.src) t.src.loop=t.loop||globalLoop; render(t);
  });
  card.querySelector('.btn-mute').addEventListener('click',()=>{t.mute=!t.mute;updateMutes();render(t);});
  card.querySelector('.btn-solo').addEventListener('click',()=>{t.solo=!t.solo;updateMutes();render(t);});
  card.querySelector('.btn-clr').addEventListener('click',()=>{
    stopTrack(t); t.buf=null; t.name=null; render(t);
  });

  scroll.appendChild(card);
});

/* ── MASTER ── */
document.getElementById('ba-play').addEventListener('click',()=>{ctx();T.forEach(t=>{if(t.buf&&!t.playing) play(t);});});
document.getElementById('ba-stop').addEventListener('click',()=>T.forEach(stopTrack));
document.getElementById('ba-rec').addEventListener('click',()=>{
  const any=T.some(t=>t.recording);
  if(any) T.forEach(t=>{if(t.recording) recStop(t);});
  else T.forEach(t=>recStart(t));
});
document.getElementById('ba-loop').addEventListener('click',function(){
  globalLoop=!globalLoop;
  this.className='mbtn'+(globalLoop?' al':'');
  T.forEach(t=>{if(t.src) t.src.loop=t.loop||globalLoop;});
});

document.addEventListener('touchmove',e=>{
  if(e.target.closest('#scroll')) return;
  e.preventDefault();
},{passive:false});

dots();
</script>
</body>
</html>
