name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          export PATH=$PATH:/opt/gradle-8.5/bin
          echo "PATH=$PATH:/opt/gradle-8.5/bin" >> $GITHUB_ENV

      - name: Create gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tape-looper-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
